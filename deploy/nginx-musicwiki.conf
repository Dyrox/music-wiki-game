# Put these locations inside the existing `server_name dyrox.cat www.dyrox.cat;`
# HTTPS server block.
#
# Important: the trailing slash in `proxy_pass http://127.0.0.1:4000/;`
# strips `/musicwiki/` before forwarding to the app. That means:
#   /musicwiki/api/health -> http://127.0.0.1:4000/api/health
#   /musicwiki/assets/x.js -> http://127.0.0.1:4000/assets/x.js

location = /musicwiki {
    return 301 /musicwiki/;
}

location ^~ /musicwiki/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_pass http://127.0.0.1:4000/;
}
