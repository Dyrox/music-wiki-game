name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
      image_base: ${{ steps.image.outputs.image_base }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image name
        id: image
        shell: bash
        run: |
          echo "image_base=${REGISTRY}/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "image=${REGISTRY}/${GITHUB_REPOSITORY,,}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            VITE_BASE_PATH=${{ vars.VITE_BASE_PATH || '/musicwiki/' }}
          tags: |
            ${{ steps.image.outputs.image }}
            ${{ steps.image.outputs.image_base }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/music-wiki-game' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        shell: bash
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$VPS_SSH_KEY"
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Upload Compose files
        shell: bash
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT $VPS_USER@$VPS_HOST"
          SCP="scp -i ~/.ssh/deploy_key -P $VPS_PORT"
          $SSH "mkdir -p '$DEPLOY_PATH'"
          $SCP deploy/compose.yml "$VPS_USER@$VPS_HOST:$DEPLOY_PATH/compose.yml"
          $SCP deploy/.env.example "$VPS_USER@$VPS_HOST:$DEPLOY_PATH/.env.example"
          $SSH "cd '$DEPLOY_PATH' && test -f .env || cp .env.example .env"

      - name: Log in to GHCR from VPS
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          printf '%s' "$GHCR_TOKEN" | ssh -i ~/.ssh/deploy_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "docker login ghcr.io -u '$GHCR_USER' --password-stdin"

      - name: Deploy
        env:
          IMAGE: ${{ needs.build.outputs.image }}
        shell: bash
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT $VPS_USER@$VPS_HOST"
          $SSH "cd '$DEPLOY_PATH' && IMAGE='$IMAGE' docker compose -f compose.yml pull app"
          $SSH "cd '$DEPLOY_PATH' && IMAGE='$IMAGE' docker compose -f compose.yml up -d --remove-orphans"
          $SSH "docker image prune -f"
